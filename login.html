<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account - Andham</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            </a>
            <a href="index.html" class="logo">Andham</a>
            <div style="width: 40px;"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-box">

            <!-- Toggle Buttons -->
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="showForm('signin')" id="signinTab">Sign In</button>
                <button class="toggle-btn" onclick="showForm('signup')" id="signupTab">Create Account</button>
            </div>

            <!-- Sign In Form -->
            <form id="signinForm" class="auth-form active" onsubmit="handleSignIn(event)">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to access your orders and saved items</p>

                <div class="form-group">
                    <label for="signinEmail">Email or Phone *</label>
                    <input type="text" id="signinEmail" required placeholder="your@email.com or phone number">
                </div>

                <div class="form-group">
                    <label for="signinPassword">Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="signinPassword" required placeholder="Enter your password">
                        <button type="button" class="toggle-password" onclick="togglePassword('signinPassword')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form" onsubmit="handleSignUp(event)">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join us for exclusive access to new collections</p>

                <div class="form-group">
                    <label for="userName">Full Name *</label>
                    <input type="text" id="userName" required placeholder="Your full name">
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address *</label>
                    <input type="email" id="signupEmail" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone" placeholder="+91 98765 43210">
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" required placeholder="Min 6 characters"
                            minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm your password">
                </div>

                <!-- Add this after confirm password field -->
                <div class="form-group">
                    <label for="address">Shipping Address *</label>
                    <textarea id="address" name="address" required
                        placeholder="Enter your full address including street, city, state, and PIN code"
                        style="width: 100%; padding: 12px 15px; border: 1px solid var(--color-border); border-radius: 4px; font-size: 14px; font-family: var(--font-sans); resize: vertical; min-height: 80px; outline: none;"></textarea>
                </div>

                <button type="submit" class="auth-btn">Create Account</button>
            </form>

        </div>
    </main>

    <!-- Footer -->
    <footer class="auth-footer">
        <p>© 2026 Andham. All rights reserved.</p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Toggle between forms
        function showForm(formType) {
            document.querySelectorAll('.auth-form').forEach(form => {
                form.classList.remove('active');
            });

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if (formType === 'signin') {
                document.getElementById('signinForm').classList.add('active');
                document.getElementById('signinTab').classList.add('active');
            } else if (formType === 'signup') {
                document.getElementById('signupForm').classList.add('active');
                document.getElementById('signupTab').classList.add('active');
            }
        }

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Show toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Handle Sign In - based on your existing table structure
        async function handleSignIn(e) {
            e.preventDefault();

            const loginInput = document.getElementById('signinEmail').value.trim();
            const password = document.getElementById('signinPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            try {
                // Check if input is email or phone
                const isEmail = loginInput.includes('@');

                let query;
                if (isEmail) {
                    query = supabaseClient
                        .from('users')
                        .select('*')
                        .eq('email', loginInput)
                        .eq('password', password)
                        .single();
                } else {
                    // Assume phone number
                    query = supabaseClient
                        .from('users')
                        .select('*')
                        .eq('phone', loginInput)
                        .eq('password', password)
                        .single();
                }

                const { data, error } = await query;

                if (error || !data) {
                    showToast('Invalid email/phone or password', 'error');
                    return;
                }

                // Store user session
                const userData = {
                    user_id: data.user_id,
                    user_name: data.user_name,
                    email: data.email,
                    phone: data.phone,
                    address: data.address,  // NEW FIELD
                    login_at: new Date().toISOString()
                };

                if (rememberMe) {
                    localStorage.setItem('andham_user', JSON.stringify(userData));
                } else {
                    sessionStorage.setItem('andham_user', JSON.stringify(userData));
                }

                showToast(`Welcome back, ${data.user_name || 'User'}!`, 'success');

                // Redirect to home or previous page
                setTimeout(() => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    window.location.href = redirect || 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Sign in error:', error);
                showToast('Something went wrong. Please try again.', 'error');
            }
        }

        // Handle Sign Up - based on your existing table structure
        // // Handle Sign Up - with address field
        async function handleSignUp(e) {
            e.preventDefault();

            const userName = document.getElementById('userName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('signupPhone').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const address = document.getElementById('address').value.trim(); // NEW FIELD

            // Validation
            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            // NEW: Address validation
            if (!address || address.length < 10) {
                showToast('Please enter a complete address (min 10 characters)', 'error');
                return;
            }

            try {
                // Check if email already exists
                const { data: existingUser } = await supabaseClient
                    .from('users')
                    .select('email')
                    .eq('email', email)
                    .single();

                if (existingUser) {
                    showToast('Email already registered. Please sign in.', 'error');
                    return;
                }

                // Check if phone already exists (if provided)
                if (phone) {
                    const { data: existingPhone } = await supabaseClient
                        .from('users')
                        .select('phone')
                        .eq('phone', phone)
                        .single();

                    if (existingPhone) {
                        showToast('Phone number already registered.', 'error');
                        return;
                    }
                }

                // Create new user WITH ADDRESS
                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        user_name: userName,
                        email: email,
                        phone: phone || null,
                        password: password,
                        address: address  // NEW FIELD
                    })
                    .select()
                    .single();

                if (error) {
                    console.error('Insert error:', error);
                    showToast('Failed to create account: ' + error.message, 'error');
                    return;
                }

                showToast('Account created successfully! Please sign in.', 'success');

                // Clear form and switch to sign in
                document.getElementById('signupForm').reset();
                setTimeout(() => {
                    showForm('signin');
                }, 1500);

            } catch (error) {
                console.error('Sign up error:', error);
                showToast('Something went wrong. Please try again.', 'error');
            }
        }
        // Check for existing session on load
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('andham_user') || sessionStorage.getItem('andham_user');

            if (user) {
                // User is already logged in, redirect to home
                const redirect = new URLSearchParams(window.location.search).get('redirect');
                window.location.href = redirect || 'index.html';
            }
        });
    </script>
    <script src="auth.js"></script>
</body>

</html>
